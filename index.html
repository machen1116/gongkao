<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>公基背多分 · 全部8周</title>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Alibaba PuHuiTi', 'PingFang SC', '-apple-system', 'Helvetica Neue', Arial, sans-serif;
  background: #f5f5f7; color: #1d1d1f;
  max-width: 420px; margin: 0 auto; min-height: 100vh;
  position: relative; overflow-x: hidden;
}
@media (min-width: 421px) { body { border-left: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0; } }

/* ===== 头部 ===== */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: #fff; padding: 28px 20px 32px; border-radius: 0 0 24px 24px;
  text-align: center; position: relative; overflow: hidden;
}
.header::after {
  content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 30px;
  background: #f5f5f7; border-radius: 24px 24px 0 0;
}
.header h1 { font-size: 26px; font-weight: 700; background: linear-gradient(90deg, #fff, #a0c4ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; }
.header p { font-size: 13px; color: rgba(255,255,255,.65); margin-top: 8px; font-weight: 300; }

/* ===== 总进度 ===== */
.total-progress {
  text-align: center; padding: 20px 16px 4px;
}
.total-progress h2 { font-size: 17px; font-weight: 600; color: #1d1d1f; }
.total-progress .big-num {
  font-size: 36px; font-weight: 700; color: #0071e3;
  background: linear-gradient(90deg, #0071e3, #5856d6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.total-progress .big-num span { font-size: 16px; font-weight: 400; color: #86868b;
  -webkit-text-fill-color: #86868b; }
.total-progress .sub { font-size: 13px; color: #86868b; margin-top: 2px; }

/* ===== 周卡片网格 ===== */
.week-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }

.week-card {
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 16px; padding: 20px 14px 18px;
  border: 1px solid rgba(255,255,255,0.5);
  box-shadow: 0 4px 20px rgba(0,0,0,.04);
  cursor: pointer; transition: all .25s;
  text-decoration: none; display: block;
  text-align: center;
}
.week-card:active { transform: scale(.96); }

.week-num {
  font-size: 13px; font-weight: 600; color: #0071e3; margin-bottom: 4px;
  text-align: center;
}
.week-title {
  font-size: 15px; font-weight: 600; color: #1d1d1f; margin-bottom: 10px;
  line-height: 1.3; min-height: 38px;
  text-align: center;
}
.week-bar {
  width: 100%; height: 5px; background: #e8e8ed; border-radius: 3px; overflow: hidden;
  margin-bottom: 6px;
}
.week-bar-fill {
  height: 100%; border-radius: 3px; transition: width .4s ease;
  background: linear-gradient(90deg, #0071e3, #5856d6);
}

/* ===== 底部 ===== */
.footer {
  text-align: center; font-size: 11px; color: #c7c7cc;
  padding: 20px 16px 32px; line-height: 1.8;
}

/* ===== iPad 适配 ===== */
@media (min-width: 421px) and (max-width: 820px) {
  body { max-width: 600px; }
  .header h1 { font-size: 32px; }
  .week-grid { gap: 16px; }
  .week-card { padding: 22px 18px 18px; }
  .week-title { font-size: 17px; min-height: 44px; }
}

</style>
</head>
<body>

<div class="header">
  <h1>📖 公基背多分</h1>
  <p>8周学习计划 · 从零到上岸</p>
</div>

<div class="total-progress">
  <h2>全部进度</h2>
  <div class="big-num" id="totalDays">0<span>/56天</span></div>
  <div class="sub" id="totalSub">🔄 加载中...</div>
</div>

<div class="week-grid" id="weekGrid">
  <!-- JS 动态生成 -->
</div>

<div class="footer">
  每天10分钟 · 坚持8周 · 夯实基础<br/>
  公基背多分 · 马老师出品
</div>

<script>
(function(){
  // ===== 周数据 =====
  var weeks = [
    { num: 1,  title: "刑法+民法",       file: "第1周.html", done: 0, total: 7 },
    { num: 2,  title: "行政法+宪法",   file: "第2周.html", done: 0, total: 7 },
    { num: 3,  title: "新思想+公文",   file: "第3周.html", done: 0, total: 7 },
    { num: 4,  title: "经济+管理+马哲", file: "第4周.html", done: 0, total: 7 },
    { num: 5,  title: "国情+省情",     file: "第5周.html", done: 0, total: 7 },
    { num: 6,  title: "科技+文化",     file: "第6周.html", done: 0, total: 7 },
    { num: 7,  title: "真题特训",       file: "第7周.html", done: 0, total: 7 },
    { num: 8,  title: "冲刺背诵",       file: "第8周.html", done: 0, total: 7 }
  ];

  // ===== 读取打卡数据 =====
  function loadProgress() {
    // 尝试从 localStorage 读取每周打卡数据
    // 格式: gj_checkin_wN = [true, false, ...] (7个布尔值)
    for(var i = 0; i < weeks.length; i++) {
      var key = 'gj_checkin_w' + weeks[i].num;
      try {
        var data = localStorage.getItem(key);
        if(data) {
          var arr = JSON.parse(data);
          if(Array.isArray(arr)) {
            weeks[i].done = arr.filter(function(v){ return v === true; }).length;
          }
        }
      } catch(e) {}
    }
  }

  // ===== 渲染卡片 =====
  function renderCards() {
    loadProgress();
    var grid = document.getElementById('weekGrid');
    var html = '';
    var totalDone = 0;

    for(var i = 0; i < weeks.length; i++) {
      var w = weeks[i];
      var pct = Math.round((w.done / w.total) * 100);
      totalDone += w.done;

      html += '<a class="week-card" href="' + w.file + '">';
      html += '  <div class="week-num">第' + numToChinese(w.num) + '周</div>';
      html += '  <div class="week-title">' + w.title + '</div>';
      html += '  <div class="week-bar"><div class="week-bar-fill" style="width:' + pct + '%"></div></div>';
      html += '</a>';
    }

    grid.innerHTML = html;

    // 更新总进度
    document.getElementById('totalDays').innerHTML = totalDone + '<span>/56天</span>';
    document.getElementById('totalSub').textContent = '📊 已完成 ' + totalDone + ' / 56 天';
  }

  function numToChinese(n) {
    return ['一','二','三','四','五','六','七','八','九','十'][n-1] || n;
  }

  // ===== 初始化 =====
  renderCards();

  // 页面回到前台时自动刷新进度
  document.addEventListener('visibilitychange', function() {
    if(!document.hidden) renderCards();
  });

  // 从历史记录返回时（浏览器后退）也自动刷新
  window.addEventListener('pageshow', function() {
    renderCards();
  });

  // 窗口获得焦点时刷新（兼容某些浏览器后退行为）
  window.addEventListener('focus', function() {
    renderCards();
  });

})();
</script>
</body>
</html>
